# =============================================================================
#  WEDDING WEBSITE SETTINGS
#  -----------------------------------------------------------------------------
#  This is the main "control panel" for your site. Change the values below,
#  save the file, and the website updates automatically once you push to GitHub.
#  You do NOT need to know how to code to edit this file.
# =============================================================================

# --- The couple --------------------------------------------------------------
partner_one: "Erin"            # Shown in a few places
partner_two: "Ben"
partner_one_full: "Erin Thompson"   # Shown big on the home page
partner_two_full: "Ben Williams"
couple_short: "Erin & Ben"     # Shown in the top header and footer

# --- Wedding details ---------------------------------------------------------
wedding_date: "2027-03-19T16:00:00"   # Used by the countdown clock. Format: YYYY-MM-DDThh:mm:ss
wedding_date_display: "March 19, 2027"  # The pretty date guests see
location: "Austin, TX"

# --- RSVP --------------------------------------------------------------------
# Paste the link to your Zola RSVP page here. Every "RSVP" button points to it.
rsvp_url: "https://www.zola.com/wedding/erinandbenmarch19/rsvp"

# --- Home page slideshow -----------------------------------------------------
# Drop your photos into the  assets/images/hero/  folder, then list them here.
# Add or remove lines to add or remove photos. They fade from one to the next.
#
# PHONE FRAMING: Photos fill the screen edge-to-edge, so on a narrow phone the
#   sides (or top/bottom) of a photo get trimmed. If someone is being cut off on
#   phones, give that ONE photo a "mobile_position" to choose which part to keep.
#   This only affects phones -- computers still show the photo centered.
#
#   To do that, change a line from the short form to the longer form, like this:
#
#       - url: "/assets/images/hero/hero-5.jpg"
#         mobile_position: "right center"
#
#   Handy values for mobile_position:
#       "center"          the default -- keep the middle
#       "left center"     keep the LEFT side       "right center"  keep the RIGHT side
#       "center top"      keep the TOP             "center bottom" keep the BOTTOM
#       "70% center"      fine-tune side to side   (0% = far left, 100% = far right)
#       "center 30%"      fine-tune up and down    (0% = top,      100% = bottom)
hero_images:
  - "/assets/images/hero/hero-1.jpg"
  - "/assets/images/hero/hero-2.jpg"
  # In hero-3 the two of you walk a little left of center, so nudge the
  # framing left on phones to keep you both in the middle.
  - url: "/assets/images/hero/hero-3.jpg"
    mobile_position: "40% center"
  - "/assets/images/hero/hero-4.jpg"
  # In hero-5 the two of you stand on the right, so keep the right side on phones.
  - url: "/assets/images/hero/hero-5.jpg"
    mobile_position: "right center"

# --- Closing photo (bottom of the home page) ---------------------------------
# A single wide photo shown near the bottom of the home page, just like the one
# at the bottom of our Zola site. Drop a photo into  assets/images/  and point
# to it here. Leave it blank ("") to hide it.
closing_photo: "/assets/images/closing.jpg"

# --- Colors (change these hex codes to re-skin the whole site) ---------------
# The whole site uses a royal-blue background with light text, just like our
# Zola page. "bg" is that blue; "text" is the soft white used for words on top.
colors:
  primary: "#3464A6"       # Main royal blue (used for the blue background too)
  primary_dark: "#183B54"  # Deep navy (footer)
  accent: "#C7305B"        # Rose accent (buttons)
  bg: "#3464A6"            # Page background — the royal blue behind everything
  bg_alt: "#2d5a99"        # A slightly deeper blue (kept for flexibility)
  text: "#eaf1fb"          # Body text — soft white that reads well on the blue

# =============================================================================
#  TECHNICAL SETTINGS — you can usually leave everything below this line alone.
# =============================================================================
# The public web address of the finished site. This is used to build full links
# in the sitemap and in social-share previews (Facebook/iMessage/etc.). It was
# set when the custom domain (erinandben2027.com) was added.
url: "https://erinandben2027.com"
baseurl: ""   # The site lives at the domain's root, so this stays empty.

title: "Erin & Ben"
description: "Join us as we celebrate our wedding. Schedule, travel, and RSVP details."
lang: "en"

plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

sass:
  style: compressed

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - LICENSE
  - vendor
  - "*.gemspec"
  # Keep the high-res floral source in the repo, but don't publish it to the live site.
  - assets/images/florals/bouquet-source.png
  # Keep the original (pre-transparency) schedule icons in the repo as a source of
  # truth, but don't publish these large backups to the live site.
  - assets/images/schedule/ceremony-orig.png
  - assets/images/schedule/cocktail-orig.png
  - assets/images/schedule/reception-orig.png
