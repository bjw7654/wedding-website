<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 340" role="img" aria-hidden="true">
  <g fill="none" stroke="#ffffff" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
    <!-- stems -->
    <path d="M2 14 C 84 28 154 50 210 104" opacity="0.85"/>
    <path d="M2 14 C 34 72 54 122 66 188" opacity="0.8"/>
    <path d="M150 70 C 170 78 188 92 200 110" opacity="0.7"/>

    <!-- leaves -->
    <g opacity="0.9">
      <g transform="translate(70 44) rotate(18)">
        <path d="M0 0 C 13 -10 32 -10 52 -2 C 32 7 13 9 0 0 Z"/>
        <path d="M3 0 H47" stroke-width="1.1"/>
      </g>
      <g transform="translate(120 70) rotate(8)">
        <path d="M0 0 C 11 -9 28 -9 46 -2 C 28 6 11 8 0 0 Z"/>
        <path d="M3 0 H41" stroke-width="1.1"/>
      </g>
      <g transform="translate(40 120) rotate(58)">
        <path d="M0 0 C 12 -9 30 -9 48 -2 C 30 6 12 8 0 0 Z"/>
        <path d="M3 0 H43" stroke-width="1.1"/>
      </g>
      <g transform="translate(58 172) rotate(74)">
        <path d="M0 0 C 10 -8 26 -8 42 -2 C 26 6 10 7 0 0 Z"/>
        <path d="M3 0 H37" stroke-width="1.1"/>
      </g>
    </g>

    <!-- small bud -->
    <g transform="translate(150 56)" opacity="0.9">
      <path d="M0 0 C -9 -4 -10 -20 0 -28 C 10 -20 9 -4 0 0 Z"/>
      <path d="M0 0 C -6 2 -8 10 -4 16"/>
      <path d="M0 0 C 6 2 8 10 4 16"/>
      <path d="M0 0 V 16"/>
    </g>

    <!-- peony bloom -->
    <g transform="translate(228 120)">
      <!-- outer petals -->
      <g opacity="0.95">
        <path transform="rotate(0)"   d="M0 0 C -12 -16 -10 -34 0 -44 C 10 -34 12 -16 0 0 Z"/>
        <path transform="rotate(45)"  d="M0 0 C -12 -16 -10 -34 0 -44 C 10 -34 12 -16 0 0 Z"/>
        <path transform="rotate(90)"  d="M0 0 C -12 -16 -10 -34 0 -44 C 10 -34 12 -16 0 0 Z"/>
        <path transform="rotate(135)" d="M0 0 C -12 -16 -10 -34 0 -44 C 10 -34 12 -16 0 0 Z"/>
        <path transform="rotate(180)" d="M0 0 C -12 -16 -10 -34 0 -44 C 10 -34 12 -16 0 0 Z"/>
        <path transform="rotate(225)" d="M0 0 C -12 -16 -10 -34 0 -44 C 10 -34 12 -16 0 0 Z"/>
        <path transform="rotate(270)" d="M0 0 C -12 -16 -10 -34 0 -44 C 10 -34 12 -16 0 0 Z"/>
        <path transform="rotate(315)" d="M0 0 C -12 -16 -10 -34 0 -44 C 10 -34 12 -16 0 0 Z"/>
      </g>
      <!-- middle petals -->
      <g opacity="0.95">
        <path transform="rotate(22.5)"  d="M0 0 C -9 -12 -8 -26 0 -33 C 8 -26 9 -12 0 0 Z"/>
        <path transform="rotate(67.5)"  d="M0 0 C -9 -12 -8 -26 0 -33 C 8 -26 9 -12 0 0 Z"/>
        <path transform="rotate(112.5)" d="M0 0 C -9 -12 -8 -26 0 -33 C 8 -26 9 -12 0 0 Z"/>
        <path transform="rotate(157.5)" d="M0 0 C -9 -12 -8 -26 0 -33 C 8 -26 9 -12 0 0 Z"/>
        <path transform="rotate(202.5)" d="M0 0 C -9 -12 -8 -26 0 -33 C 8 -26 9 -12 0 0 Z"/>
        <path transform="rotate(247.5)" d="M0 0 C -9 -12 -8 -26 0 -33 C 8 -26 9 -12 0 0 Z"/>
        <path transform="rotate(292.5)" d="M0 0 C -9 -12 -8 -26 0 -33 C 8 -26 9 -12 0 0 Z"/>
        <path transform="rotate(337.5)" d="M0 0 C -9 -12 -8 -26 0 -33 C 8 -26 9 -12 0 0 Z"/>
      </g>
      <!-- inner petals -->
      <g>
        <path transform="rotate(0)"   d="M0 0 C -6 -8 -5 -18 0 -23 C 5 -18 6 -8 0 0 Z"/>
        <path transform="rotate(60)"  d="M0 0 C -6 -8 -5 -18 0 -23 C 5 -18 6 -8 0 0 Z"/>
        <path transform="rotate(120)" d="M0 0 C -6 -8 -5 -18 0 -23 C 5 -18 6 -8 0 0 Z"/>
        <path transform="rotate(180)" d="M0 0 C -6 -8 -5 -18 0 -23 C 5 -18 6 -8 0 0 Z"/>
        <path transform="rotate(240)" d="M0 0 C -6 -8 -5 -18 0 -23 C 5 -18 6 -8 0 0 Z"/>
        <path transform="rotate(300)" d="M0 0 C -6 -8 -5 -18 0 -23 C 5 -18 6 -8 0 0 Z"/>
      </g>
      <circle r="3.5"/>
    </g>
  </g>
</svg>
