<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Placeholder photo">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3f72b0"/>
      <stop offset="1" stop-color="#183B54"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="1000" fill="url(#bg)"/>

  <!-- faint peony motifs -->
  <g fill="none" stroke="#ffffff" stroke-opacity="0.14" stroke-width="4" stroke-linejoin="round">
    <g transform="translate(180 200) scale(3)">
      <path transform="rotate(0)"   d="M0 0 C -12 -16 -10 -34 0 -44 C 10 -34 12 -16 0 0 Z"/>
      <path transform="rotate(45)"  d="M0 0 C -12 -16 -10 -34 0 -44 C 10 -34 12 -16 0 0 Z"/>
      <path transform="rotate(90)"  d="M0 0 C -12 -16 -10 -34 0 -44 C 10 -34 12 -16 0 0 Z"/>
      <path transform="rotate(135)" d="M0 0 C -12 -16 -10 -34 0 -44 C 10 -34 12 -16 0 0 Z"/>
      <path transform="rotate(180)" d="M0 0 C -12 -16 -10 -34 0 -44 C 10 -34 12 -16 0 0 Z"/>
      <path transform="rotate(225)" d="M0 0 C -12 -16 -10 -34 0 -44 C 10 -34 12 -16 0 0 Z"/>
      <path transform="rotate(270)" d="M0 0 C -12 -16 -10 -34 0 -44 C 10 -34 12 -16 0 0 Z"/>
      <path transform="rotate(315)" d="M0 0 C -12 -16 -10 -34 0 -44 C 10 -34 12 -16 0 0 Z"/>
    </g>
    <g transform="translate(1430 820) scale(3.4)">
      <path transform="rotate(0)"   d="M0 0 C -12 -16 -10 -34 0 -44 C 10 -34 12 -16 0 0 Z"/>
      <path transform="rotate(60)"  d="M0 0 C -12 -16 -10 -34 0 -44 C 10 -34 12 -16 0 0 Z"/>
      <path transform="rotate(120)" d="M0 0 C -12 -16 -10 -34 0 -44 C 10 -34 12 -16 0 0 Z"/>
      <path transform="rotate(180)" d="M0 0 C -12 -16 -10 -34 0 -44 C 10 -34 12 -16 0 0 Z"/>
      <path transform="rotate(240)" d="M0 0 C -12 -16 -10 -34 0 -44 C 10 -34 12 -16 0 0 Z"/>
      <path transform="rotate(300)" d="M0 0 C -12 -16 -10 -34 0 -44 C 10 -34 12 -16 0 0 Z"/>
    </g>
  </g>

  <text x="800" y="470" text-anchor="middle" fill="#ffffff"
        font-family="'Great Vibes', 'Segoe Script', cursive" font-size="150">Erin &amp; Ben</text>
  <text x="800" y="565" text-anchor="middle" fill="#ffffff" fill-opacity="0.85"
        font-family="Georgia, serif" font-size="30" letter-spacing="6">ADD YOUR PHOTOS IN  assets/images/hero/</text>
