<header class="site-header">
  <a class="site-header__title" href="{{ '/' | relative_url }}">{{ site.couple_short }}</a>

  <button class="nav-toggle" aria-expanded="false" aria-controls="site-nav" aria-label="Open menu">
    <span></span><span></span><span></span>
  </button>

  <nav class="site-nav" id="site-nav" aria-label="Main">
    <ul>
      {% assign nav_pages = site.pages | where_exp: "p", "p.nav_order" | sort: "nav_order" %}
      {% for p in nav_pages %}
      <li>
        <a href="{{ p.url | relative_url }}"{% if page.url == p.url %} class="is-active" aria-current="page"{% endif %}>{{ p.title }}</a>
      </li>
      {% endfor %}
      {% if site.rsvp_url and site.rsvp_url != "" %}
      <li class="nav-rsvp">
        <a href="{{ site.rsvp_url }}" target="_blank" rel="noopener">RSVP</a>
      </li>
      {% endif %}
    </ul>
  </nav>
</header>
